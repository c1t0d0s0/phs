<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tide Graph</title>
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <script src="config.js"></script>
    <script>
      // 動的にGTMタグを読み込む
      if (typeof GTM_ID !== 'undefined') {
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=' + GTM_ID;
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', GTM_ID);
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --text-color: #ffffff;
            --bg-color: #1a1a1a;
            --overlay-color: rgba(0, 0, 0, 0.5);
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            margin-top: 0;
            text-shadow: 2px 2px 4px var(--overlay-color);
        }

        .tide-name {
            font-size: 2rem;
            color: #87ceeb;
            margin-left: 10px;
        }

        .tide-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .tide-graph-wrapper {
            position: relative;
            flex-grow: 1;
            min-height: 300px;
            width: 100%;
        }

        .tide-summary {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            font-size: 1.5rem;
        }

        .tide-row {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            text-shadow: 1px 1px 2px var(--overlay-color);
        }

        .tide-time {
            font-weight: bold;
            color: #87ceeb;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }
            .tide-name {
                font-size: 1.2rem;
            }
            .tide-info {
                padding: 10px;
            }
            .tide-summary {
                font-size: 1.2rem;
                gap: 10px;
            }
            .tide-row {
                padding: 8px 15px;
                width: 100%;
                justify-content: space-between;
                box-sizing: border-box;
            }
            .nav-links {
                margin-bottom: 15px;
            }
            .nav-links a {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="tide-header">潮汐グラフ</h1>
        
        <div class="tide-info">
            <div class="tide-graph-wrapper">
                <canvas id="tide-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchAndRenderTide();
            // 1時間ごとに更新
            setInterval(fetchAndRenderTide, 60 * 60 * 1000);
        });

        let tideChart = null;

        async function fetchAndRenderTide() {
            try {
                const response = await fetch('tide.json?t=' + new Date().getTime());
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                if (data.tide_name) {
                    const header = document.getElementById('tide-header');
                    header.innerHTML = `潮汐グラフ <span class="tide-name">(${data.tide_name})</span>`;
                }

                // --- Tide Graph ---
                const ctx = document.getElementById('tide-chart').getContext('2d');
                if (tideChart) {
                    tideChart.destroy();
                }

                if (data.tide_hourly && data.tide_hourly.length > 0) {
                    const today = new Date().toISOString().slice(0, 10);
                    
                    const chartData = data.tide_hourly.map(item => ({
                        x: `${today}T${item.time}:00`,
                        y: item.cm
                    }));
                    
                    const tideTimes = (data.tide || []).map(item => {
                        const timePart = item.split(' ')[0];
                        return `${today}T${timePart}:00`;
                    });

                    const now = new Date();
                    const currentIndex = `${today}T${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:00`;

                    const chartAnnotations = {
                        line1: {
                            type: 'line',
                            xMin: currentIndex,
                            xMax: currentIndex,
                            borderColor: 'rgba(255, 99, 132, 0.8)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            label: {
                                content: '現在時刻',
                                enabled: true,
                                position: 'start',
                                backgroundColor: 'rgba(255, 99, 132, 0.8)',
                                font: {
                                    size: window.innerWidth < 768 ? 10 : 12
                                }
                            }
                        }
                    };

                    if (data.sunrise) {
                        const sunriseTime = data.sunrise.replace(/^0/, '');
                        const sunriseIndex = `${today}T${data.sunrise}:00`;
                        chartAnnotations.sunrise = {
                            type: 'line',
                            xMin: sunriseIndex,
                            xMax: sunriseIndex,
                            borderColor: 'rgba(255, 206, 86, 0.8)',
                            borderWidth: 2,
                            borderDash: [3, 3],
                            label: {
                                content: `日の出 ${sunriseTime}`,
                                enabled: true,
                                position: 'start',
                                yAdjust: -25,
                                backgroundColor: 'rgba(255, 206, 86, 0.8)',
                                color: '#000',
                                font: {
                                    size: 12,
                                    weight: 'bold'
                                }
                            }
                        };
                    }

                    if (data.sunset) {
                        const sunsetTime = data.sunset.replace(/^0/, '');
                        const sunsetIndex = `${today}T${data.sunset}:00`;
                        chartAnnotations.sunset = {
                            type: 'line',
                            xMin: sunsetIndex,
                            xMax: sunsetIndex,
                            borderColor: 'rgba(255, 159, 64, 0.8)',
                            borderWidth: 2,
                            borderDash: [3, 3],
                            label: {
                                content: `日の入 ${sunsetTime}`,
                                enabled: true,
                                position: 'start',
                                yAdjust: -25,
                                backgroundColor: 'rgba(255, 159, 64, 0.8)',
                                color: '#fff',
                                font: {
                                    size: 12,
                                    weight: 'bold'
                                }
                            }
                        };
                    }

                    tideChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            datasets: [{
                                label: '潮位 (cm)',
                                data: chartData,
                                borderColor: 'rgba(54, 162, 235, 1)',
                                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                borderWidth: 3,
                                pointRadius: 0,
                                pointHitRadius: 10,
                                tension: 0.4,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            layout: {
                                padding: {
                                    top: 20,
                                    right: 20,
                                    bottom: 0,
                                    left: 0
                                }
                            },
                            scales: {
                                x: {
                                    type: 'time',
                                    time: {
                                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                                        unit: 'hour',
                                        displayFormats: {
                                            hour: 'H:mm'
                                        }
                                    },
                                    afterBuildTicks: (scale) => {
                                        scale.ticks = [];
                                        tideTimes.forEach(time => {
                                            scale.ticks.push({
                                                value: new Date(time).getTime(),
                                                label: new Date(time).toLocaleTimeString('ja-JP', { hour: 'numeric', minute: '2-digit' })
                                            });
                                        });
                                    },
                                    ticks: {
                                        color: '#fff',
                                        maxRotation: 0,
                                        autoSkip: false,
                                        font: {
                                            size: window.innerWidth < 768 ? 12 : 14
                                        }
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)',
                                        drawBorder: false
                                    }
                                },
                                y: {
                                    ticks: {
                                        color: '#fff',
                                        font: {
                                            size: window.innerWidth < 768 ? 12 : 14
                                        }
                                    },
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)',
                                        drawBorder: false
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    display: false
                                },
                                tooltip: {
                                    mode: 'index',
                                    intersect: false,
                                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                    titleFont: { size: 14 },
                                    bodyFont: { size: 14 },
                                    padding: 10,
                                    callbacks: {
                                        label: function(context) {
                                            return `潮位: ${context.parsed.y} cm`;
                                        }
                                    }
                                },
                                annotation: {
                                    annotations: chartAnnotations
                                }
                            }
                        }
                    });

                    // Update annotation line every minute
                    if (window.tideChartInterval) clearInterval(window.tideChartInterval);
                    window.tideChartInterval = setInterval(() => {
                        if (tideChart) {
                            const nowUpdate = new Date();
                            const newIndex = `${today}T${String(nowUpdate.getHours()).padStart(2, '0')}:${String(nowUpdate.getMinutes()).padStart(2, '0')}:00`;
                            tideChart.options.plugins.annotation.annotations.line1.xMin = newIndex;
                            tideChart.options.plugins.annotation.annotations.line1.xMax = newIndex;
                            tideChart.update('none'); // Update without animation
                        }
                    }, 60 * 1000);

                                                                            }            } catch (error) {
                console.error('Failed to load tide data:', error);
                const wrapper = document.querySelector('.tide-graph-wrapper');
                if (wrapper) wrapper.innerHTML = '<div style="color: #ff6b6b; text-align: center; padding: 20px;">潮汐情報の読み込みに失敗しました。</div>';
            }
        }
    </script>
</body>
</html>

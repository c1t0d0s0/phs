name: Fetch hourly RSS and deploy Pages

on:
  workflow_run:
    workflows:
      - pages-build-deployment
      - pages build and deployment
    types: [completed]
    branches: [main]   # デフォルトブランチに合わせる
  schedule:
    - cron: "22 * * * *"   # 毎時 22分 UTC（JST 毎時+9h）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements-rss.txt ]; then pip install -r scripts/requirements-rss.txt; fi

      - name: Run RSS script (download images to docs/images, generate docs/rss.json)
        run: |
          python scripts/rss.py docs > docs/rss.json
          python scripts/rss.py docs --test > docs/rss-test.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
